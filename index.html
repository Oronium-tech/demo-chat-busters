<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buster's Feedback</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC1F1A;--redL:#FEF2F1;
  --dark:#0F0F0F;--body:#2E2E2E;--muted:#888;--border:#E8E6E3;
  --bg:#F5F4F1;--green:#22C55E;
}
@keyframes bpPop{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bpUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes bpDot{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-6px);opacity:1}}

html{height:100%;height:100dvh}
body{
  height:100%;height:100dvh;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.shell{
  width:100%;max-width:430px;
  height:100%;max-height:680px;
  display:flex;flex-direction:column;
  border-radius:28px;overflow:hidden;
  box-shadow:0 16px 64px rgba(0,0,0,.13);
  background:#fff;
}
@media(max-width:500px){
  body{padding:0;align-items:stretch;justify-content:stretch}
  .shell{max-width:100%;max-height:100%;border-radius:0;box-shadow:none}
}

/* ── HEADER ── */
.hdr{
  flex:0 0 auto;
  background:var(--red);
  padding:16px 18px 14px;
  padding-top:max(16px,env(safe-area-inset-top));
  display:flex;align-items:center;gap:13px;
}
.hav{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;line-height:1;
}
.hinfo{flex:1;min-width:0}
.hname{color:#fff;font-weight:700;font-size:16px;letter-spacing:-.3px;line-height:1.2}
.hstatus{
  display:flex;align-items:center;gap:6px;
  margin-top:3px;color:rgba(255,255,255,.72);font-size:12.5px;
}
.hdot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  box-shadow:0 0 0 2px rgba(34,197,94,.25);
}
.hlink{color:rgba(255,255,255,.5);font-size:11.5px;text-decoration:none;white-space:nowrap;flex-shrink:0}

/* ── PROGRESS ── */
.prog-track{flex:0 0 3px;background:rgba(0,0,0,.06)}
.prog-fill{height:100%;background:var(--red);border-radius:0 3px 3px 0;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* ── MESSAGES ── */
.msgs{
  flex:1 1 0;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:12px;
  background:#FAFAF8;
}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}

/* ── BUBBLES ── */
.bot-row{
  display:flex;align-items:flex-end;gap:9px;
  animation:bpPop .3s cubic-bezier(.34,1.5,.64,1) forwards;opacity:0;
}
.bot-av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;line-height:1;margin-bottom:2px;
}
.bot-b{
  background:#fff;border:1px solid var(--border);
  border-radius:18px 18px 18px 4px;
  padding:12px 16px;max-width:80%;
  font-size:15.5px;color:var(--body);line-height:1.6;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.user-row{
  display:flex;justify-content:flex-end;
  animation:bpPop .24s cubic-bezier(.34,1.5,.64,1) forwards;opacity:0;
}
.user-b{
  background:var(--red);
  border-radius:18px 18px 4px 18px;
  padding:12px 16px;max-width:74%;
  font-size:15.5px;color:#fff;line-height:1.6;font-weight:500;
}
.typing-b{
  background:#fff;border:1px solid var(--border);
  border-radius:18px 18px 18px 4px;
  padding:13px 17px;display:flex;gap:6px;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.dot{width:7px;height:7px;border-radius:50%;background:#D0CEC9}

/* ── INPUT BAR ── */
.ibar{
  flex:0 0 auto;
  border-top:1px solid var(--border);
  background:#fff;
  padding:14px 16px;
  padding-bottom:max(14px,env(safe-area-inset-bottom));
}
.ibar.hidden{display:none}

/* ── STARS ── */
.stars{display:flex;gap:4px}
.star{
  background:none;border:none;cursor:pointer;
  padding:3px 4px;font-size:36px;
  color:#E5E3DF;transition:color .1s,transform .14s;line-height:1;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.star.on{color:var(--red)}
.star-lbl{
  height:20px;margin-top:5px;
  font-size:13px;font-weight:600;color:var(--red);
  opacity:0;transition:opacity .15s;letter-spacing:.1px;
}
.star-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}

/* ── SEND BUTTON ── */
.send-btn{
  background:var(--red);border:none;border-radius:24px;
  color:#fff;font-size:15px;font-weight:600;
  padding:13px 26px;cursor:pointer;flex-shrink:0;
  font-family:inherit;margin-top:2px;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.send-btn:active{opacity:.8;transform:scale(.96)}

/* ── TEXTAREA ── */
.text-row{display:flex;gap:10px;align-items:flex-end}
.ta{
  flex:1;resize:none;font-family:inherit;
  border:1.5px solid var(--border);border-radius:16px;
  padding:12px 15px;
  font-size:15.5px;color:var(--body);line-height:1.5;
  background:#FAFAF8;outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.ta:focus{border-color:var(--red);background:#fff}
.ta::placeholder{color:#B8B4AE}
.send-up{
  background:var(--red);border:none;border-radius:24px;
  color:#fff;font-size:20px;font-weight:600;
  padding:11px 16px;cursor:pointer;flex-shrink:0;
  font-family:inherit;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.send-up:active{opacity:.8;transform:scale(.96)}
.skip-btn{
  background:none;border:none;cursor:pointer;
  font-size:13px;color:var(--muted);padding:2px;
  text-decoration:underline;text-underline-offset:3px;
  font-family:inherit;display:block;margin:8px 0 0 auto;
  -webkit-tap-highlight-color:transparent;
}

/* ── SMS ── */
.sms-row{display:flex;gap:10px}
.sms-yes{
  flex:1;padding:14px 12px;
  background:var(--red);border:1.5px solid var(--red);
  border-radius:24px;font-size:15px;font-weight:600;
  color:#fff;cursor:pointer;font-family:inherit;touch-action:manipulation;
}
.sms-yes:active{opacity:.8}
.sms-no{
  flex:1;padding:14px 12px;
  background:#fff;border:1.5px solid var(--border);
  border-radius:24px;font-size:15px;font-weight:500;
  color:var(--muted);cursor:pointer;font-family:inherit;
  touch-action:manipulation;transition:border-color .14s,color .14s;
}
.sms-no:active{border-color:var(--red);color:var(--red)}

/* ── COUPON ── */
.coupon-wrap{margin-left:43px;animation:bpUp .38s ease forwards;opacity:0}
.coupon{
  background:#fff;border:1.5px dashed var(--red);
  border-radius:18px;padding:20px 22px;max-width:270px;
  text-align:center;box-shadow:0 3px 20px rgba(204,31,26,.09);
}
.c-icon{font-size:30px;line-height:1}
.c-title{font-weight:700;font-size:16px;color:var(--dark);margin-top:9px;line-height:1.3}
.c-code{
  margin:13px 0 9px;background:var(--redL);border-radius:11px;
  padding:10px 18px;font-family:'Courier New',monospace;
  font-size:22px;font-weight:700;color:var(--red);letter-spacing:3px;
}
.c-fine{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.c-cta{
  display:inline-block;background:var(--red);color:#fff;
  border-radius:24px;padding:10px 24px;
  font-size:14px;font-weight:600;text-decoration:none;
}

/* ── THANKS ── */
.thanks-wrap{margin-left:43px;animation:bpUp .38s ease forwards;opacity:0}
.thanks-card{
  background:#fff;border:1px solid var(--border);
  border-radius:18px;padding:18px 20px;max-width:290px;
}
.t-p{font-size:14.5px;color:var(--body);line-height:1.65;margin-bottom:15px}
.check-row{
  display:flex;align-items:flex-start;gap:11px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
}
.chkbox{
  width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:2px;
  border:2px solid var(--border);background:transparent;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.chkbox.on{border-color:var(--red);background:var(--red)}
.check-lbl{font-size:14.5px;color:var(--body);line-height:1.55}
.gbtn{
  display:inline-flex;align-items:center;gap:8px;
  background:#4285F4;color:#fff;border-radius:24px;
  padding:11px 20px;font-size:14px;font-weight:600;
  text-decoration:none;margin-top:14px;
  animation:bpUp .2s ease forwards;opacity:0;
}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hav">🍕</div>
    <div class="hinfo">
      <div class="hname">Buster's Pizza &amp; Donair</div>
      <div class="hstatus"><span class="hdot"></span>Quick feedback · takes 60 sec</div>
    </div>
    <a class="hlink" href="https://www.busterspizza.ca" target="_blank">busterspizza.ca ↗</a>
  </div>

  <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
  <div class="msgs" id="msgs"></div>
  <div class="ibar hidden" id="ibar"></div>

</div>
<script>
const FLOW=[
  {id:"intro",type:"bot-only",bot:["Hey! 👋 Thanks for coming into Buster's.","Got 60 seconds? We'd love to hear how it went."],autoNext:700},
  {id:"food_rating",type:"star",bot:"How would you rate the taste and quality of your food?"},
  {id:"food_comment",type:"text",optional:true,bot:"Nice! Anything you'd like us to know — what you loved or what we could improve?",ph:"e.g. The donair sauce was amazing 🔥"},
  {id:"service_rating",type:"star",bot:"How satisfied are you with the overall service?"},
  {id:"service_comment",type:"text",optional:true,bot:"Any names to shout out or moments we should know about?",ph:"e.g. The person at the front was super helpful"},
  {id:"sms",type:"sms",bot:"Last thing — want to hear about our deals and specials over text?"},
  {id:"coupon",type:"coupon",bot:"You're a legend 🙌 Here's something for next time:"},
  {id:"thanks",type:"thanks",bot:"That's all — seriously appreciate the feedback. See you soon! 🍕"},
];
const LABELS=["Terrible","Poor","Okay","Good","Amazing!"];
const qSteps=FLOW.filter(s=>["star","text","sms"].includes(s.type));
const TOTAL_Q=qSteps.length;
const msgsEl=document.getElementById("msgs");
const ibarEl=document.getElementById("ibar");
const progEl=document.getElementById("prog");
let stepIdx=-1,starVal=0,lock=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const scroll=()=>setTimeout(()=>{msgsEl.scrollTop=msgsEl.scrollHeight},60);
const showIbar=()=>ibarEl.classList.remove("hidden");
const hideIbar=()=>ibarEl.classList.add("hidden");

function setProgress(idx){
  const qi=qSteps.findIndex(s=>s.id===(FLOW[idx]||{}).id);
  progEl.style.width=(qi>=0?Math.round((qi/TOTAL_Q)*100):0)+"%";
}
async function pushBot(text){
  hideIbar();
  const tr=document.createElement("div");tr.className="bot-row";
  tr.innerHTML=`<div class="bot-av">🍕</div><div class="typing-b"><div class="dot" style="animation:bpDot 1s 0s ease-in-out infinite"></div><div class="dot" style="animation:bpDot 1s .2s ease-in-out infinite"></div><div class="dot" style="animation:bpDot 1s .4s ease-in-out infinite"></div></div>`;
  msgsEl.appendChild(tr);scroll();
  await sleep(Math.min(460+text.length*11,1050));
  msgsEl.removeChild(tr);
  const row=document.createElement("div");row.className="bot-row";
  row.innerHTML=`<div class="bot-av">🍕</div><div class="bot-b">${text}</div>`;
  msgsEl.appendChild(row);scroll();
  await sleep(60);
}
function pushUser(text){
  const row=document.createElement("div");row.className="user-row";
  row.innerHTML=`<div class="user-b">${text}</div>`;
  msgsEl.appendChild(row);scroll();
}
async function goTo(idx){
  if(idx>=FLOW.length||lock)return;
  lock=true;stepIdx=idx;starVal=0;
  setProgress(idx);
  const s=FLOW[idx];
  for(const l of(Array.isArray(s.bot)?s.bot:[s.bot]))await pushBot(l);
  if(s.type==="bot-only"){lock=false;await sleep(s.autoNext||500);goTo(idx+1);return;}
  if(s.type==="coupon"){renderCoupon();lock=false;await sleep(1400);goTo(idx+1);return;}
  if(s.type==="thanks"){renderThanks();progEl.style.width="100%";lock=false;return;}
  lock=false;renderInput(s);
}
async function submit(txt,next){
  pushUser(txt);hideIbar();await sleep(220);goTo(next);
}
function renderInput(s){
  ibarEl.innerHTML="";showIbar();
  if(s.type==="star"){
    const wrap=document.createElement("div");
    const row=document.createElement("div");row.className="star-row";
    const left=document.createElement("div");
    const sr=document.createElement("div");sr.className="stars";
    const lbl=document.createElement("div");lbl.className="star-lbl";
    const upd=hov=>{
      const a=hov||starVal;
      sr.querySelectorAll(".star").forEach((b,i)=>{
        b.className="star"+(i<a?" on":"");
        b.style.transform=(i+1===a)?"scale(1.2)":"scale(1)";
      });
      lbl.style.opacity=a?1:0;
      lbl.textContent=a?LABELS[a-1]:"";
    };
    for(let i=1;i<=5;i++){
      const b=document.createElement("button");b.className="star";b.textContent="★";
      b.onmouseenter=()=>upd(i);b.onmouseleave=()=>upd(0);
      b.ontouchstart=e=>{e.preventDefault();starVal=i;upd(0);};
      b.onclick=()=>{starVal=i;upd(0);};
      sr.appendChild(b);
    }
    left.appendChild(sr);left.appendChild(lbl);
    const btn=document.createElement("button");btn.className="send-btn";btn.textContent="Send";
    btn.onclick=()=>{
      if(!starVal){lbl.textContent="Please pick a rating";lbl.style.opacity=1;return;}
      submit("★".repeat(starVal)+"  "+LABELS[starVal-1],stepIdx+1);
    };
    row.appendChild(left);row.appendChild(btn);wrap.appendChild(row);ibarEl.appendChild(wrap);
  }
  if(s.type==="text"){
    const wrap=document.createElement("div");
    const row=document.createElement("div");row.className="text-row";
    const ta=document.createElement("textarea");ta.className="ta";ta.rows=2;ta.placeholder=s.ph||"";
    ta.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};
    ta.onfocus=()=>setTimeout(scroll,350);
    const up=document.createElement("button");up.className="send-up";up.textContent="↑";
    const send=(skip=false)=>submit(skip||!ta.value.trim()?"No comment":ta.value.trim(),stepIdx+1);
    up.onclick=()=>send();
    row.appendChild(ta);row.appendChild(up);wrap.appendChild(row);
    if(s.optional){
      const sk=document.createElement("button");sk.className="skip-btn";sk.textContent="Skip this one";
      sk.onclick=()=>send(true);wrap.appendChild(sk);
    }
    ibarEl.appendChild(wrap);
    setTimeout(()=>ta.focus(),100);
  }
  if(s.type==="sms"){
    const row=document.createElement("div");row.className="sms-row";
    const y=document.createElement("button");y.className="sms-yes";y.textContent="Yes, send me deals!";
    const n=document.createElement("button");n.className="sms-no";n.textContent="No thanks";
    y.onclick=()=>submit("Yes, keep me in! 📲",stepIdx+1);
    n.onclick=()=>submit("No thanks, opt me out",stepIdx+1);
    row.appendChild(y);row.appendChild(n);ibarEl.appendChild(row);
  }
}
function renderCoupon(){
  const w=document.createElement("div");w.className="coupon-wrap";
  w.innerHTML=`<div class="coupon"><div class="c-icon">🎁</div><div class="c-title">10% off your next order</div><div class="c-code">BUSTER10</div><div class="c-fine">Valid in-store &amp; online · expires in 30 days</div><a class="c-cta" href="https://busterspizza.olo.com/" target="_blank">Order online ↗</a></div>`;
  msgsEl.appendChild(w);scroll();
}
function renderThanks(){
  const w=document.createElement("div");w.className="thanks-wrap";
  const card=document.createElement("div");card.className="thanks-card";
  const p=document.createElement("p");p.className="t-p";
  p.textContent="Enjoyed your visit? A quick Google review helps other locals find us — and means the world to our team. 🙏";
  const cr=document.createElement("div");cr.className="check-row";
  const cb=document.createElement("div");cb.className="chkbox";
  const lbl=document.createElement("span");lbl.className="check-lbl";lbl.textContent="Yes, I'll leave a Google review!";
  let chk=false;
  cr.onclick=()=>{
    chk=!chk;cb.className="chkbox"+(chk?" on":"");
    cb.innerHTML=chk?`<svg width="11" height="9" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:"";
    if(chk&&!card.querySelector(".gbtn")){
      const a=document.createElement("a");a.className="gbtn";
      a.href="https://g.page/r/busterspizza/review";a.target="_blank";
      a.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Leave a Google review`;
      card.appendChild(a);scroll();
    }
    if(!chk){const a=card.querySelector(".gbtn");if(a)a.remove();}
  };
  cr.appendChild(cb);cr.appendChild(lbl);
  card.appendChild(p);card.appendChild(cr);
  w.appendChild(card);msgsEl.appendChild(w);scroll();
}
goTo(0);
</script>
</body>
</html>
